name: Scrape UCR events

# Runs the Localist scraper + normalizer daily and upserts to Supabase.
# Can also be triggered manually from the Actions tab.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL          — https://qyxlojftdtjasxhzyqil.supabase.co
#   SUPABASE_SERVICE_KEY  — the service_role JWT (bypasses RLS)
#
# The Instagram pipeline isn't run here — it needs IG session secrets we
# don't keep in CI. Add a separate workflow + IG_USERNAME/IG_SESSION_FILE
# secrets if you want it scheduled.

on:
  schedule:
    # 13:00 UTC = 6 AM Pacific (PDT) / 5 AM Pacific (PST).
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: pip install -r requirements.txt

      - name: Scrape events.ucr.edu → Supabase
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python ucr_events.py
          python normalize_events.py
